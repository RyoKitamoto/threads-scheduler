name: Threads 予約投稿を自動公開

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 予約投稿を確認・公開
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python3 publish_scheduled.py

      - name: 更新された scheduled_posts.json をコミット
        run: |
          git config --global user.name "threads-scheduler[bot]"
          git config --global user.email "threads-scheduler@users.noreply.github.com"
          git add scheduled_posts.json
          git diff --staged --quiet || git commit -m "Auto: update post status [skip ci]"
          git push
